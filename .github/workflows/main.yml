name : Run Cucumber Tests
on:
    push:
        branches: [master]

jobs:
  test:
    runs-on: Windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          cache: maven
          distribution: 'temurin'
      - run : mvn clean test